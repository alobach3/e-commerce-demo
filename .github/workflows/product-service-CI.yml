name: product service CI

on:
  push:
    branches: [ "main" ]
    paths: 
      - 'src/product-service/**'
  #pull_request:
    #branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  docker-deploy:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout Code
          uses: actions/checkout@v6

        - name: Install Docker
          uses: docker/setup-buildx-action@v4
        
        - name: Login to Docker
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}

        - name: Docker Build and Push
          uses: docker/build-push-action@v7
          with:
            context: src/product-service
            file: src/product-service/Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/product-service-git:${{github.sha}}

  update-k8s:
    runs-on: ubuntu-latest
    needs: docker-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/product-service.*|image: ${{ secrets.DOCKER_USERNAME }}/product-service-git:${{ github.sha }}|" k8s/product-service.yaml

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
            commit_message: "[CI]: update product-service image tag to ${{ github.sha }}"
            branch: main
            file_pattern: k8s/product-service.yaml #  File pattern used for `git add`.
            
