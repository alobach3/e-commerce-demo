name: CI Template

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string
      k8s-manifest:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  docker-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name:  Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.service-path }}
          file: ${{ inputs.service-path }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}-git:${{ github.sha }}

  update-k8s:
    runs-on: ubuntu-latest
    needs: docker-deploy
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}-git:${{ github.sha }}|" ${{ inputs.k8s-manifest }}

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[CI]: update ${{ inputs.service-name }} image tag to ${{ github.sha }}"
          branch: main
          file_pattern: ${{ inputs.k8s-manifest }}
