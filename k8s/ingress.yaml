apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  rules:
    - host: myapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          - path: /products
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8080

          - path: /pay
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8080